<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>白乾涛</title>
    <meta name="description" content="白乾涛的个人博客">
    <meta property="og:type" content="website">
    <meta property="og:title" content="白乾涛">
    <meta property="og:url" content="https://baiqiantao.github.io/">
    <meta property="og:site_name" content="白乾涛">
    <link rel="shortcut icon" href="/hexoBlog/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
          color: #2c3e50;
          background: #fafafa;
          line-height: 1.8;
          -webkit-font-smoothing: antialiased;
        }

        a { color: #2c3e50; text-decoration: none; }
        a:hover { color: #3498db; }

        .container {
          max-width: 640px;
          margin: 0 auto;
          padding: 0 24px;
        }

        /* Header */
        header {
          padding: 120px 0 60px;
          text-align: center;
        }

        .avatar {
          width: 96px;
          height: 96px;
          border-radius: 50%;
          background: linear-gradient(135deg, #667eea, #764ba2);
          display: inline-flex;
          align-items: center;
          justify-content: center;
          color: #fff;
          font-size: 36px;
          font-weight: 600;
          margin-bottom: 24px;
          letter-spacing: 2px;
        }

        h1 {
          font-size: 28px;
          font-weight: 700;
          letter-spacing: 1px;
          margin-bottom: 8px;
        }

        .tagline {
          font-size: 15px;
          color: #8899aa;
          font-weight: 400;
        }

        /* Nav links */
        nav {
          display: flex;
          justify-content: center;
          gap: 32px;
          padding: 20px 0;
          margin-bottom: 40px;
          border-top: 1px solid #eee;
          border-bottom: 1px solid #eee;
        }

        nav a {
          font-size: 14px;
          color: #8899aa;
          letter-spacing: 0.5px;
          transition: color 0.2s;
        }

        nav a:hover { color: #2c3e50; }

        /* Content sections */
        .section {
          padding: 32px 0;
        }

        .section h2 {
          font-size: 13px;
          font-weight: 600;
          color: #aab;
          text-transform: uppercase;
          letter-spacing: 2px;
          margin-bottom: 20px;
        }

        .section p {
          font-size: 15px;
          color: #556;
          line-height: 1.9;
        }

        /* Link list */
        .links {
          list-style: none;
        }

        .links li {
          padding: 10px 0;
          border-bottom: 1px solid #f0f0f0;
        }

        .links li:last-child { border-bottom: none; }

        .links a {
          display: flex;
          justify-content: space-between;
          align-items: center;
          font-size: 15px;
          color: #2c3e50;
          transition: color 0.2s;
        }

        .links a:hover { color: #3498db; }

        .links .arrow {
          color: #ccc;
          font-size: 14px;
          transition: transform 0.2s, color 0.2s;
        }

        .links a:hover .arrow {
          color: #3498db;
          transform: translateX(3px);
        }

        /* Footer */
        footer {
          text-align: center;
          padding: 48px 0;
          font-size: 13px;
          color: #bbb;
        }

        footer a { color: #aaa; }
        footer a:hover { color: #2c3e50; }

        @media (max-width: 480px) {
          header { padding: 80px 0 40px; }
          h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="avatar">白</div>
        <h1>白乾涛</h1>
        <p class="tagline">Android开发工程师</p>
    </header>

    <nav>
        <a href="https://www.cnblogs.com/baiqiantao" target="_blank" rel="noopener">个人博客</a>
        <a href="https://github.com/baiqiantao" target="_blank" rel="noopener">GitHub</a>
    </nav>

    <footer>
        &copy; 2026 白乾涛
    </footer>
</div>
</body>
</html>
